<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ecomm-site</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    .login-page {
      min-height: calc(100vh - var(--nav-height) - 48px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
    }
    .login-card {
      width: 100%;
      max-width: 460px;
      background: var(--white);
      border: 1px solid var(--border);
      padding: 52px 48px;
    }
    .login-logo {
      font-family: var(--font-display);
      font-size: 26px;
      color: var(--brown);
      margin-bottom: 32px;
      text-align: center;
    }
    .login-logo span { color: var(--terracotta); }
    .login-card h2 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 400;
      color: var(--brown);
      margin-bottom: 6px;
      text-align: center;
    }
    .login-card > p {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      background: var(--cream);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: var(--transition);
      font-family: var(--font-body);
    }
    .form-group input:focus { border-color: var(--brown); background: var(--white); }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--white);
      border: 1px solid var(--border);
      padding: 13px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-body);
      margin-bottom: 4px;
    }
    .btn-google:hover { background: var(--cream); }
    .btn-google img { width: 18px; height: 18px; }
    .auth-error { color: var(--terracotta); font-size: 13px; margin-top: 8px; display: none; }
    .auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
    .auth-switch a { color: var(--brown); text-decoration: underline; cursor: pointer; }
    .hidden { display: none !important; }
    @media (max-width: 520px) {
      .login-card { padding: 40px 28px; }
    }
  </style>
</head>
<body>
<div class="page-content">
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">ecomm-<span>site</span></div>

      <!-- LOGIN -->
      <div id="login-section">
        <h2>Welcome back</h2>
        <p>Sign in to save your cart and view order history</p>

        <button class="btn-google" id="btn-google-signin">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
          Continue with Google
        </button>

        <div class="auth-divider">or sign in with email</div>

        <form id="login-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="you@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password" />
          </div>
          <div class="auth-error" id="login-error"></div>
          <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;">Sign In</button>
        </form>

        <div class="auth-switch">Don't have an account? <a id="to-register">Create one</a></div>
        <div class="auth-switch" style="margin-top:8px"><a href="index.html">← Continue as guest</a></div>
      </div>

      <!-- REGISTER -->
      <div id="register-section" class="hidden">
        <h2>Create account</h2>
        <p>Join to save your cart and track orders</p>

        <button class="btn-google" id="btn-google-register">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
          Continue with Google
        </button>

        <div class="auth-divider">or register with email</div>

        <form id="register-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="Your name" autocomplete="name" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="you@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Minimum 6 characters" autocomplete="new-password" />
          </div>
          <div class="auth-error" id="register-error"></div>
          <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;">Create Account</button>
        </form>

        <div class="auth-switch">Already have an account? <a id="to-login">Sign in</a></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { injectLayout } from './js/layout.js';
  import { initAuth, signInWithGoogle, signInWithEmail, registerWithEmail } from './js/auth.js';
  import { initCartSidebar } from './js/cart.js';

  injectLayout();
  initCartSidebar();

  // Remove the shared login modal on the dedicated auth page to avoid duplicate IDs/forms.
  document.getElementById('login-modal-overlay')?.remove();

  const redirectTarget = new URLSearchParams(location.search).get('redirect') || 'index.html';

  // If already logged in, redirect as soon as auth state resolves.
  initAuth();
  window.addEventListener('auth-state-changed', e => {
    if (e.detail?.user) {
      window.location.href = redirectTarget;
    }
  });

  // Redirect after login
  window.addEventListener('user-logged-in', () => {
    window.location.href = redirectTarget;
  });

  const loginSection    = document.getElementById('login-section');
  const registerSection = document.getElementById('register-section');

  document.getElementById('to-register')?.addEventListener('click', () => {
    loginSection.classList.add('hidden');
    registerSection.classList.remove('hidden');
  });
  document.getElementById('to-login')?.addEventListener('click', () => {
    registerSection.classList.add('hidden');
    loginSection.classList.remove('hidden');
  });

  // Google
  document.getElementById('btn-google-signin')?.addEventListener('click', signInWithGoogle);
  document.getElementById('btn-google-register')?.addEventListener('click', signInWithGoogle);

  // Email login
  document.getElementById('login-form')?.addEventListener('submit', async e => {
    e.preventDefault();
    const email = e.target.querySelector('[name="email"]').value;
    const pass  = e.target.querySelector('[name="password"]').value;
    const err = document.getElementById('login-error');
    try { await signInWithEmail(email, pass); }
    catch (ex) { err.textContent = ex.message; err.style.display = 'block'; }
  });

  // Register
  document.getElementById('register-form')?.addEventListener('submit', async e => {
    e.preventDefault();
    const name  = e.target.querySelector('[name="name"]').value;
    const email = e.target.querySelector('[name="email"]').value;
    const pass  = e.target.querySelector('[name="password"]').value;
    const err = document.getElementById('register-error');
    try { await registerWithEmail(email, pass, name); }
    catch (ex) { err.textContent = ex.message; err.style.display = 'block'; }
  });
</script>
</body>
</html>
